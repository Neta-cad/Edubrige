<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit School Profile - EduBridge</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Edu<span>Bridge</span></a>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
      </div>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card" style="max-width: 600px;">
      <h1>Your School Profile</h1>
      <p class="auth-subtitle">This is what job seekers, tutors, and students will see</p>

      <form id="schoolProfileForm">
        <div class="form-group">
          <label>School Name</label>
          <input type="text" id="schoolName" placeholder="e.g. Brightwood Academy" required>
        </div>

        <div class="form-group">
          <label>Description</label>
          <textarea id="schoolDescription" rows="5" placeholder="Tell people about your school, mission, and what makes it special..."></textarea>
        </div>

        <div class="form-group">
          <label>School Type</label>
          <select id="schoolType">
            <option value="">Select type</option>
            <option value="primary">Primary School</option>
            <option value="secondary">Secondary School</option>
            <option value="tertiary">Tertiary / University</option>
            <option value="vocational">Vocational / Training Center</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label>Address</label>
          <input type="text" id="schoolAddress" placeholder="Full address">
        </div>

        <div class="form-group">
          <label>Founded Year</label>
          <input type="number" id="foundedYear" placeholder="e.g. 1998" min="1800" max="2026">
        </div>

        <div class="form-group">
          <label>Website (optional)</label>
          <input type="url" id="schoolWebsite" placeholder="https://yourschool.com">
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <button type="submit" class="btn btn-primary btn-full">Save Profile</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/school-profile.js"></script>
</body>
</html>
