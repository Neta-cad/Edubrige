<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - EduBridge</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Edu<span>Bridge</span></a>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Login to your EduBridge account</p>

      <form id="loginForm">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="register.html">Create one here</a></p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
