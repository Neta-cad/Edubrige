<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post a Job - EduBridge</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Edu<span>Bridge</span></a>
      <div class="nav-actions">
        <a href="dashboard.html" class="btn btn-outline">Back to Dashboard</a>
      </div>
    </div>
  </header>

  <section class="auth-section">
    <div class="auth-card" style="max-width: 600px;">
      <h1>Post a New Job</h1>
      <p class="auth-subtitle">Reach qualified educators across EduBridge</p>

      <form id="postJobForm">
        <div class="form-group">
          <label>Job Title</label>
          <input type="text" id="jobTitle" placeholder="e.g. Mathematics Teacher" required>
        </div>

        <div class="form-group">
          <label>Job Description</label>
          <textarea id="jobDescription" rows="5" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
        </div>

        <div class="form-group">
          <label>Subject / Department</label>
          <input type="text" id="jobSubject" placeholder="e.g. Mathematics, English, Administration">
        </div>

        <div class="form-group">
          <label>Job Type</label>
          <select id="jobType" required>
            <option value="">Select type</option>
            <option value="full_time">Full Time</option>
            <option value="part_time">Part Time</option>
            <option value="contract">Contract</option>
            <option value="volunteer">Volunteer</option>
          </select>
        </div>

        <div class="form-group">
          <label>Location</label>
          <input type="text" id="jobLocation" placeholder="e.g. Lagos, Nigeria">
        </div>

        <div class="form-group">
          <label>Salary Range (optional)</label>
          <input type="text" id="jobSalary" placeholder="e.g. ₦80,000 - ₦120,000/month">
        </div>

        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <button type="submit" class="btn btn-primary btn-full">Post Job</button>
      </form>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/jobs.js"></script>
</body>
</html>
