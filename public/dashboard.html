<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - EduBridge</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

  <header class="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo">Edu<span>Bridge</span></a>
      <div class="nav-actions" id="navActions">
        <a href="#" id="logoutBtn" class="btn btn-outline">Logout</a>
      </div>
    </div>
  </header>

  <section class="dashboard-section">
    <div class="dashboard-header">
      <h1 id="welcomeMsg">Welcome back!</h1>
      <span id="roleBadge" class="role-badge"></span>
    </div>

    <div class="dashboard-grid" id="dashboardGrid">
      <!-- Content injected by JS based on role -->
      <p>Loading your dashboard...</p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabaseClient.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
